services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass supersecret123
    volumes:
      - redis-data:/data

  redis-insight:
    image: redislabs/redisinsight:1.14.0
    container_name: redis-insight
    ports:
      - "5540:8001"
    depends_on:
      - redis

  mc-init:
    image: minio/mc
    container_name: mc-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin password123)
      do
        echo 'Waiting for MinIO...'
        sleep 1
      done;

      /usr/bin/mc mb --ignore-existing myminio/my-bucket;
      /usr/bin/mc anonymous set download myminio/my-bucket/products/;

      echo 'MinIO initialized successfully';
      exit 0;
      "

volumes:
  redis-data: