spring:
  application:
    name: taupay

  datasource:
    url: jdbc:postgresql://localhost:5432/taupay_db
    username: postgres
    password: password

  data:
    redis:
      host: localhost
      port: 6379
      password: supersecret123
      timeout: 2s
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: debug

jwt:
   secret: 1234567890123456789012345678901234567890123456789012345678901234
   expiration: 86400000

app:
  cache:
    merchant-category-ttl: 1h
  transaction:
    ttl: 5m
  rate-limit:
    enabled: true
    api-prefix: /api/v1
    capacity: 15
    window: 1m
  payment-lock:
    duration: 15m

minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: password123
  bucket: my-bucket
  public-url: http://localhost:9000