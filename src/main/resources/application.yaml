spring:
  application:
    name: taupay

  datasource:
    url: jdbc:postgresql://localhost:5432/taupay_db
    username: postgres
    password: password

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
   secret: 1234567890123456789012345678901234567890123456789012345678901234
   expiration: 86400000

app:
  cache:
    merchant-category-ttl: 1h
